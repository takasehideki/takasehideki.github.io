bio: |
  組込みシステムや IoT コンピューティングを主な研究対象として、あらゆるモノ・コトとヒトを繋げる設計基盤の確立を目指しています。

  システムレベルの最適化や設計技術に関する研究開発に取り組んでおり、モットーは「良いモノを誰でも楽につくることができる世界へ」です。

